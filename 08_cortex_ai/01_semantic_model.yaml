name: EWS_Fraud_Analytics
description: >
  Semantic model for EWS POC Gold Iceberg tables.
  Enables Cortex Analyst to answer natural language questions about
  transactions, fraud signals, member activity, and institutional metrics.

tables:
  - name: DAILY_MEMBER_SUMMARY
    description: Aggregated daily transaction metrics per member
    base_table:
      database: EWS_POC
      schema: GOLD
      table: DAILY_MEMBER_SUMMARY
    dimensions:
      - name: member_id
        description: Unique member identifier
        expr: member_id
        data_type: VARCHAR
      - name: institution_id
        description: Financial institution identifier
        expr: institution_id
        data_type: VARCHAR
      - name: transaction_date
        description: Date of transactions
        expr: txn_date
        data_type: DATE
    time_dimensions:
      - name: txn_date
        description: Transaction date for time-series analysis
        expr: txn_date
        data_type: DATE
    measures:
      - name: total_transactions
        description: Total number of transactions
        expr: SUM(txn_count)
        data_type: NUMBER
      - name: total_volume
        description: Total transaction amount in USD
        expr: SUM(total_amount)
        data_type: NUMBER
      - name: average_transaction
        description: Average transaction amount
        expr: AVG(avg_amount)
        data_type: NUMBER
      - name: max_risk_score
        description: Maximum risk score observed
        expr: MAX(max_risk_score)
        data_type: NUMBER

  - name: FRAUD_SIGNALS
    description: Combined fraud alerts and high-risk events
    base_table:
      database: EWS_POC
      schema: GOLD
      table: FRAUD_SIGNALS
    dimensions:
      - name: signal_id
        description: Unique signal identifier
        expr: signal_id
        data_type: VARCHAR
      - name: member_id
        description: Affected member
        expr: member_id
        data_type: VARCHAR
      - name: institution_id
        description: Institution where signal originated
        expr: institution_id
        data_type: VARCHAR
      - name: signal_source
        description: Whether signal is an ALERT or HIGH_RISK_EVENT
        expr: signal_source
        data_type: VARCHAR
      - name: alert_type
        description: Type of alert (FRAUD_SUSPECTED, AML_SAR, VELOCITY, IDENTITY)
        expr: alert_type
        data_type: VARCHAR
      - name: severity
        description: Alert severity level
        expr: severity
        data_type: VARCHAR
    time_dimensions:
      - name: signal_time
        description: When the signal was generated
        expr: signal_time
        data_type: TIMESTAMP_LTZ
    measures:
      - name: total_signals
        description: Count of fraud signals
        expr: COUNT(signal_id)
        data_type: NUMBER
      - name: avg_risk_score
        description: Average risk score of signals
        expr: AVG(event_risk_score)
        data_type: NUMBER
      - name: high_severity_count
        description: Count of HIGH or CRITICAL severity signals
        expr: COUNT_IF(severity IN ('HIGH', 'CRITICAL'))
        data_type: NUMBER

  - name: MEMBER_ACTIVITY
    description: Member profile with 30-day activity summary
    base_table:
      database: EWS_POC
      schema: GOLD
      table: MEMBER_ACTIVITY
    dimensions:
      - name: member_id
        description: Unique member identifier
        expr: member_id
        data_type: VARCHAR
      - name: institution_id
        description: Member's institution
        expr: institution_id
        data_type: VARCHAR
      - name: risk_tier
        description: Member risk classification (LOW, MEDIUM, HIGH, CRITICAL)
        expr: risk_tier
        data_type: VARCHAR
      - name: member_status
        description: Account status (ACTIVE, SUSPENDED, CLOSED)
        expr: member_status
        data_type: VARCHAR
    measures:
      - name: total_members
        description: Count of members
        expr: COUNT(DISTINCT member_id)
        data_type: NUMBER
      - name: total_spend_30d
        description: Total spending in last 30 days
        expr: SUM(total_spend_30d)
        data_type: NUMBER
      - name: avg_transactions_30d
        description: Average transaction count per member
        expr: AVG(txn_count_30d)
        data_type: NUMBER
      - name: members_with_alerts
        description: Members with open alerts
        expr: COUNT_IF(open_alerts > 0)
        data_type: NUMBER

  - name: INSTITUTION_SUMMARY
    description: Aggregated metrics per financial institution
    base_table:
      database: EWS_POC
      schema: GOLD
      table: INSTITUTION_SUMMARY
    dimensions:
      - name: institution_id
        description: Institution identifier
        expr: institution_id
        data_type: VARCHAR
      - name: institution_name
        description: Institution name
        expr: institution_name
        data_type: VARCHAR
      - name: institution_type
        description: Type (BANK, CREDIT_UNION, FINTECH, PROCESSOR)
        expr: institution_type
        data_type: VARCHAR
      - name: region
        description: Geographic region
        expr: region
        data_type: VARCHAR
      - name: asset_size_tier
        description: Asset size tier (SMALL, MEDIUM, LARGE, MEGA)
        expr: asset_size_tier
        data_type: VARCHAR
    measures:
      - name: total_institutions
        description: Count of institutions
        expr: COUNT(DISTINCT institution_id)
        data_type: NUMBER
      - name: total_active_members
        description: Sum of active members across institutions
        expr: SUM(active_members_30d)
        data_type: NUMBER
      - name: total_transaction_volume
        description: Total transaction volume across institutions
        expr: SUM(total_volume_30d)
        data_type: NUMBER
      - name: total_critical_alerts
        description: Sum of critical alerts
        expr: SUM(critical_alerts_30d)
        data_type: NUMBER

verified_queries:
  - question: "How many fraud signals were there in the last 7 days?"
    sql: >
      SELECT COUNT(*) AS total_signals
      FROM EWS_POC.GOLD.FRAUD_SIGNALS
      WHERE signal_time >= DATEADD('day', -7, CURRENT_TIMESTAMP())

  - question: "Which institutions have the most critical alerts?"
    sql: >
      SELECT institution_name, critical_alerts_30d
      FROM EWS_POC.GOLD.INSTITUTION_SUMMARY
      WHERE critical_alerts_30d > 0
      ORDER BY critical_alerts_30d DESC
      LIMIT 10

  - question: "Show me daily transaction volume for the last 30 days"
    sql: >
      SELECT txn_date, SUM(txn_count) AS daily_txns, SUM(total_amount) AS daily_volume
      FROM EWS_POC.GOLD.DAILY_MEMBER_SUMMARY
      WHERE txn_date >= DATEADD('day', -30, CURRENT_DATE())
      GROUP BY txn_date
      ORDER BY txn_date
