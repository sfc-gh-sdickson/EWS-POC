<svg viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <!-- Title -->
  <text x="700" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">EWS POC &#8212; Deployment Gantt Chart</text>
  <text x="700" y="55" text-anchor="middle" font-size="11" fill="#666">32 working days | 9 phases | Critical path highlighted in blue</text>

  <!-- Timeline header -->
  <rect x="300" y="70" width="1070" height="25" rx="3" fill="#f5f5f5" stroke="#ccc"/>
  <text x="340" y="87" font-size="9" font-weight="bold" fill="#333">Week 1</text>
  <text x="555" y="87" font-size="9" font-weight="bold" fill="#333">Week 2</text>
  <text x="770" y="87" font-size="9" font-weight="bold" fill="#333">Week 3</text>
  <text x="985" y="87" font-size="9" font-weight="bold" fill="#333">Week 4</text>
  <text x="1200" y="87" font-size="9" font-weight="bold" fill="#333">Week 5</text>
  <!-- Day markers -->
  <line x1="300" y1="95" x2="300" y2="800" stroke="#eee" stroke-width="1"/>
  <line x1="515" y1="95" x2="515" y2="800" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="730" y1="95" x2="730" y2="800" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="945" y1="95" x2="945" y2="800" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="1160" y1="95" x2="1160" y2="800" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Phase 1: Foundation (Days 1-6) -->
  <rect x="10" y="100" width="280" height="22" rx="3" fill="#1565c0"/>
  <text x="20" y="115" font-size="10" font-weight="bold" fill="#fff">Phase 1: Foundation</text>
  <rect x="300" y="100" width="258" height="20" rx="3" fill="#1565c0" opacity="0.8"/>
  <text x="310" y="114" font-size="8" fill="#fff">IAM + Storage + Volume + DB + RBAC (6 days)</text>
  <circle cx="558" cy="110" r="6" fill="#ff9800"/>

  <!-- Phase 2: Batch Ingestion (Days 7-14) -->
  <rect x="10" y="135" width="280" height="22" rx="3" fill="#2e7d32"/>
  <text x="20" y="150" font-size="10" font-weight="bold" fill="#fff">Phase 2: UC01 Batch Ingestion</text>
  <rect x="558" y="135" width="344" height="20" rx="3" fill="#2e7d32" opacity="0.8"/>
  <text x="568" y="149" font-size="8" fill="#fff">Tables + Formats + Stages + COPY + Dead Letter + DMFs (8 days)</text>
  <circle cx="902" cy="145" r="6" fill="#ff9800"/>

  <!-- Phase 3: Streaming (Days 7-13, parallel with Phase 2) -->
  <rect x="10" y="170" width="280" height="22" rx="3" fill="#00695c"/>
  <text x="20" y="185" font-size="10" font-weight="bold" fill="#fff">Phase 3: UC02 Streaming</text>
  <rect x="558" y="170" width="258" height="20" rx="3" fill="#00695c" opacity="0.8"/>
  <text x="568" y="184" font-size="8" fill="#fff">Key Pair + PIPE + SDK Client + Validation (6 days)</text>
  <circle cx="816" cy="180" r="6" fill="#ff9800"/>

  <!-- Phase 4: Pipeline (Days 15-21) -->
  <rect x="10" y="210" width="280" height="22" rx="3" fill="#283593"/>
  <text x="20" y="225" font-size="10" font-weight="bold" fill="#fff">Phase 4: UC03 Dynamic Table Pipeline</text>
  <rect x="902" y="210" width="301" height="20" rx="3" fill="#283593" opacity="0.8"/>
  <text x="912" y="224" font-size="8" fill="#fff">Silver DTs + Gold DTs + DMF Gates + Monitoring (7 days)</text>
  <circle cx="1203" cy="220" r="6" fill="#ff9800"/>

  <!-- Phase 5: Feature Store (Days 22-28) -->
  <rect x="10" y="250" width="280" height="22" rx="3" fill="#4527a0"/>
  <text x="20" y="265" font-size="10" font-weight="bold" fill="#fff">Phase 5: UC04-05 Feature Store</text>
  <rect x="1000" y="250" width="301" height="20" rx="3" fill="#4527a0" opacity="0.8"/>
  <text x="1010" y="264" font-size="8" fill="#fff">Online DT + SLO + Remat + Time Travel + PIT Join (7 days)</text>
  <circle cx="1301" cy="260" r="6" fill="#ff9800"/>

  <!-- Phase 6: Analytics (Days 22-28, parallel with Phase 5) -->
  <rect x="10" y="290" width="280" height="22" rx="3" fill="#e65100"/>
  <text x="20" y="305" font-size="10" font-weight="bold" fill="#fff">Phase 6: UC09 Analytics Performance</text>
  <rect x="1000" y="290" width="301" height="20" rx="3" fill="#e65100" opacity="0.7"/>
  <text x="1010" y="304" font-size="8" fill="#fff">Warehouse + BI + DS + Time Travel + Load Test (7 days)</text>

  <!-- Phase 7: Governance (Days 22-27, parallel) -->
  <rect x="10" y="325" width="280" height="22" rx="3" fill="#c62828"/>
  <text x="20" y="340" font-size="10" font-weight="bold" fill="#fff">Phase 7: UC10-11 Governance + Sharing</text>
  <rect x="1000" y="325" width="258" height="20" rx="3" fill="#c62828" opacity="0.7"/>
  <text x="1010" y="339" font-size="8" fill="#fff">Tags + RLS + Masking + SSO + Share + Mktplace (6 days)</text>

  <!-- Phase 8: Cortex AI (Days 22-29, parallel) -->
  <rect x="10" y="360" width="280" height="22" rx="3" fill="#6a1b9a"/>
  <text x="20" y="375" font-size="10" font-weight="bold" fill="#fff">Phase 8: UC13-14 Cortex AI</text>
  <rect x="1000" y="360" width="344" height="20" rx="3" fill="#6a1b9a" opacity="0.7"/>
  <text x="1010" y="374" font-size="8" fill="#fff">Semantic YAML + Analyst Client + Agentic + Git (8 days)</text>

  <!-- Phase 9: Integration (Days 29-32) -->
  <rect x="10" y="400" width="280" height="22" rx="3" fill="#333333"/>
  <text x="20" y="415" font-size="10" font-weight="bold" fill="#fff">Phase 9: Integration + Demo</text>
  <rect x="1200" y="400" width="172" height="20" rx="3" fill="#333333" opacity="0.8"/>
  <text x="1210" y="414" font-size="8" fill="#fff">E2E Test + Demo Prep (4 days)</text>
  <circle cx="1372" cy="410" r="8" fill="#2e7d32" stroke="#fff" stroke-width="2"/>

  <!-- Critical path indicator -->
  <rect x="300" y="100" width="3" height="320" fill="#1565c0" opacity="0.3"/>

  <!-- Legend -->
  <rect x="10" y="450" width="1360" height="1" fill="#ccc"/>
  <text x="20" y="475" font-size="11" font-weight="bold" fill="#333">Legend</text>
  <circle cx="30" cy="497" r="6" fill="#ff9800"/>
  <text x="45" y="501" font-size="9" fill="#333">Milestone checkpoint (validation gate)</text>
  <circle cx="250" cy="497" r="6" fill="#2e7d32" stroke="#fff" stroke-width="2"/>
  <text x="265" y="501" font-size="9" fill="#333">POC Complete</text>
  <rect x="430" y="492" width="40" height="10" rx="2" fill="#1565c0" opacity="0.8"/>
  <text x="480" y="501" font-size="9" fill="#333">Critical path (serial dependency)</text>
  <rect x="680" y="492" width="40" height="10" rx="2" fill="#e65100" opacity="0.7"/>
  <text x="730" y="501" font-size="9" fill="#333">Parallel execution (not on critical path)</text>

  <!-- Resource allocation -->
  <rect x="10" y="520" width="1360" height="280" rx="6" fill="#f9f9f9" stroke="#ddd"/>
  <text x="30" y="545" font-size="12" font-weight="bold" fill="#333">Work Breakdown: Parallel Execution Windows</text>

  <!-- Parallel execution blocks -->
  <rect x="30" y="560" width="200" height="30" rx="4" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="40" y="579" font-size="9" fill="#0d47a1">Phases 2+3 run in parallel</text>
  <rect x="250" y="560" width="200" height="30" rx="4" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="260" y="579" font-size="9" fill="#1b5e20">Saves ~6 days vs serial</text>

  <rect x="30" y="600" width="200" height="30" rx="4" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="40" y="619" font-size="9" fill="#0d47a1">Phases 5+6+7+8 in parallel</text>
  <rect x="250" y="600" width="200" height="30" rx="4" fill="#e8f5e9" stroke="#2e7d32"/>
  <text x="260" y="619" font-size="9" fill="#1b5e20">Saves ~14 days vs serial</text>

  <!-- Key metrics -->
  <rect x="30" y="650" width="300" height="70" rx="6" fill="#ffffff" stroke="#29B5E8" stroke-width="2"/>
  <text x="50" y="672" font-size="10" font-weight="bold" fill="#0277bd">Critical Path Duration</text>
  <text x="50" y="692" font-size="22" font-weight="bold" fill="#1565c0">32 working days</text>
  <text x="50" y="710" font-size="9" fill="#666">(~6.5 weeks with parallel execution)</text>

  <rect x="360" y="650" width="300" height="70" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="2"/>
  <text x="380" y="672" font-size="10" font-weight="bold" fill="#2e7d32">Total Work Items</text>
  <text x="380" y="692" font-size="22" font-weight="bold" fill="#2e7d32">47 tasks</text>
  <text x="380" y="710" font-size="9" fill="#666">across 9 phases, 10 use cases</text>

  <rect x="690" y="650" width="300" height="70" rx="6" fill="#ffffff" stroke="#e65100" stroke-width="2"/>
  <text x="710" y="672" font-size="10" font-weight="bold" fill="#e65100">Parallelizable Savings</text>
  <text x="710" y="692" font-size="22" font-weight="bold" fill="#e65100">20 days saved</text>
  <text x="710" y="710" font-size="9" fill="#666">vs fully serial execution (52 days)</text>

  <rect x="1020" y="650" width="300" height="70" rx="6" fill="#ffffff" stroke="#4527a0" stroke-width="2"/>
  <text x="1040" y="672" font-size="10" font-weight="bold" fill="#4527a0">Milestone Gates</text>
  <text x="1040" y="692" font-size="22" font-weight="bold" fill="#4527a0">8 checkpoints</text>
  <text x="1040" y="710" font-size="9" fill="#666">validation required before proceeding</text>

  <!-- Snowflake branding -->
  <rect x="10" y="740" width="1360" height="30" rx="4" fill="#29B5E8"/>
  <text x="700" y="760" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Snowflake AI Data Cloud &#8212; Compute-Only Deployment Over EWS-Owned Apache Iceberg</text>
</svg>
